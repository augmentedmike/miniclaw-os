name: Tests

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install vitest globally
        run: npm install -g vitest

      - name: Install plugin dependencies
        run: |
          for dir in plugins/mc-*/; do
            if [ -f "$dir/vitest.config.ts" ]; then
              echo "Installing deps for $(basename $dir)..."
              (cd "$dir" && npm install) || true
            fi
          done

      - name: Run tests
        run: npm test
